<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nomeação CEJUSC</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS customizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">Sistema de Nomeação - CEJUSC</h2>

    <form method="POST">
        <div class="mb-3">
            <label>1️⃣ Cole aqui as nomeações já realizadas:</label>
            <textarea class="form-control" name="existentes" rows="10">{{ existentes }}</textarea>
        </div>
        <div class="mb-3">
            <label>2️⃣ Cole aqui as audiências que deseja nomear:</label>
            <textarea class="form-control" name="novos" rows="10">{{ novos }}</textarea>
        </div>
        <button class="btn btn-success" type="submit">Gerar Nomeações</button>
    </form>

    {% if message %}
    <div class="alert alert-info mt-3">{{ message }}</div>
    {% endif %}

    <div class="mt-3">
        <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
    </div>
</div>

{% if excel_ready %}
<script>
    // Redireciona para download automaticamente
    window.location.href = "{{ url_for('download_excel') }}";
</script>
{% endif %}

</body>
</html>
